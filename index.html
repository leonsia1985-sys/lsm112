<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>부산 여행 및 독립서점 지도</title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/tl_bus_station_info_3.js"></script>
        <script src="data/busan_travel_4.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[35.28303291015279,129.16265165292452],[35.292822261353045,129.17906004936825]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        // 팝업 내용 정리 함수들
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    var img = popup._contentNode.querySelector('td img');
                    if (img) {
                        if (img.complete && img.naturalHeight > 0) {
                            popup.update();
                        } else {
                            img.addEventListener('load', function() { popup.update(); });
                            img.addEventListener('error', function() { popup.update(); });
                        }
                    }
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        
        var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() { }
        
        // 배경 지도 설정 (OpenStreetMap)
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('http://tile.osm.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0', opacity: 1.0, attribution: '', minZoom: 1, maxZoom: 28, minNativeZoom: 0, maxNativeZoom: 19
        });
        map.addLayer(layer_OpenStreetMap_0);

        // 버스 정류장 레이어 설정
        function pop_tl_bus_station_info_3(feature, layer) { /* ... 기존 팝업 코드 유지 ... */ }
        function style_tl_bus_station_info_3_0() {
            return {
                pane: 'pane_tl_bus_station_info_3', radius: 4.0, opacity: 1, color: 'rgba(50,87,128,1.0)',
                weight: 2.0, fill: true, fillOpacity: 1, fillColor: 'rgba(72,123,182,1.0)', interactive: false,
            }
        }
        map.createPane('pane_tl_bus_station_info_3');
        map.getPane('pane_tl_bus_station_info_3').style.zIndex = 403;
        var layer_tl_bus_station_info_3 = new L.geoJson(json_tl_bus_station_info_3, {
            attribution: '', interactive: false, dataVar: 'json_tl_bus_station_info_3', layerName: 'layer_tl_bus_station_info_3', pane: 'pane_tl_bus_station_info_3',
            onEachFeature: pop_tl_bus_station_info_3,
            pointToLayer: function (feature, latlng) { return L.circleMarker(latlng, style_tl_bus_station_info_3_0(feature)); },
        });
        bounds_group.addLayer(layer_tl_bus_station_info_3);
        map.addLayer(layer_tl_bus_station_info_3);

        // 부산 여행 레이어 설정
        function pop_busan_travel_4(feature, layer) { /* ... 기존 팝업 코드 유지 ... */ }
        function style_busan_travel_4_0() {
            return {
                pane: 'pane_busan_travel_4', radius: 20.0, opacity: 1, color: 'rgba(61,128,53,1.0)',
                weight: 2.0, fill: true, fillOpacity: 1, fillColor: 'rgba(84,176,74,1.0)', interactive: false,
            }
        }
        map.createPane('pane_busan_travel_4');
        map.getPane('pane_busan_travel_4').style.zIndex = 404;
        var layer_busan_travel_4 = new L.geoJson(json_busan_travel_4, {
            attribution: '', interactive: false, dataVar: 'json_busan_travel_4', layerName: 'layer_busan_travel_4', pane: 'pane_busan_travel_4',
            onEachFeature: pop_busan_travel_4,
            pointToLayer: function (feature, latlng) { return L.circleMarker(latlng, style_busan_travel_4_0(feature)); },
        });
        bounds_group.addLayer(layer_busan_travel_4);
        map.addLayer(layer_busan_travel_4);
        
        setBounds();

        // 마커 이미지 경로 오류 방지
        L.Icon.Default.imagePath = 'https://unpkg.com/leaflet@1.9.4/dist/images/';


        // ======================================================================
        // 🌟 한국문화정보원 독립서점 API 코드 (여기서부터 새로 추가된 부분입니다)
        // ======================================================================
        
        const apiKey = 'e006aa61-8ce2-4b67-b828-ba3e15ef2aa5';
        
        // 🚨 꼭 수정해야 할 부분 1: API_상세주소
        // 매뉴얼에 있는 실제 요청 주소(예: API_CCA_142/request 등)로 'API_상세주소' 글자를 바꿔주세요.
        const apiUrl = `https://api.kcisa.kr/openapi/API_상세주소?serviceKey=${apiKey}&numOfRows=100&_type=json`;

        fetch(apiUrl)
          .then(response => response.json())
          .then(data => {
            console.log("문화정보원에서 받아온 원본 데이터:", data);

            // 데이터 구조가 맞는지 확인
            if (data.response && data.response.body && data.response.body.items) {
              let bookstores = data.response.body.items.item;
              
              if (!Array.isArray(bookstores)) {
                bookstores = [bookstores];
              }

              bookstores.forEach(store => {
                // 🚨 꼭 수정해야 할 부분 2: 데이터 필드명
                // F12 콘솔창을 확인하시고, 실제 위도/경도/상호명이 적힌 영문 이름으로 아래 3개를 바꿔주세요.
                // (예시: store.latitude -> store.Y_CRD)
                const lat = store.latitude; 
                const lng = store.longitude;
                const name = store.title; 

                // 좌표가 존재하면 지도에 파란색 기본 마커로 표시합니다.
                if (lat && lng) {
                  L.marker([lat, lng])
                   .addTo(map)
                   .bindPopup(`<b>${name}</b>`);
                }
              });
            } else {
              console.log("데이터 구조가 예상과 다릅니다. F12 콘솔창의 '원본 데이터'를 확인해주세요.");
            }
          })
          .catch(error => {
            console.error('API 호출 중 에러 발생 (주소나 CORS 설정을 확인하세요):', error);
          });
          
        // ======================================================================
        // 🌟 API 코드 끝
        // ======================================================================

        </script>        
    </body>
</html>
